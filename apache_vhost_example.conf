<VirtualHost *:80>
    # Sesuaikan dengan domain utama aplikasi PasekSaaS Anda
    ServerName websitewayan.my.id
    
    # [CRITICAL] Alias wildcard memastikan setiap akses subdomain tenant masuk ke codebase ini
    ServerAlias *.websitewayan.my.id

    DocumentRoot /var/www/html/websitewayan

    # Log file khusus (sangat dianjurkan)
    ErrorLog ${APACHE_LOG_DIR}/paseksaas_error.log
    CustomLog ${APACHE_LOG_DIR}/paseksaas_access.log combined

    <Directory /var/www/html/websitewayan>
        # -Indexes: Matikan fitur folder listing
        # +FollowSymLinks: Dibutuhkan untuk .htaccess rewrite kalau nanti dipasang
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Pertahanan Lapis Kedua (Mengamankan core system & raw React src fallback)
    <DirectoryMatch "^/var/www/html/websitewayan/(includes|react-app/(?!dist)|\.git)">
        Require all denied
    </DirectoryMatch>
</VirtualHost>
